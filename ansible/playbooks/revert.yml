---
# Revert all nodes to original configuration
# Usage: ansible-playbook playbooks/revert.yml
- name: Revert Talos QEMU configuration
  hosts: all
  become: yes
  tasks:
    - name: Stop VM service
      ansible.builtin.systemd:
        name: "talos-qemu@{{ inventory_hostname }}"
        state: stopped
      ignore_errors: yes

    - name: Disable VM service
      ansible.builtin.systemd:
        name: "talos-qemu@{{ inventory_hostname }}"
        enabled: no
      ignore_errors: yes

    - name: Run cleanup
      ansible.builtin.command: bash {{ talos_qemu_dir }}/clean.sh
      args:
        chdir: "{{ talos_qemu_dir }}"
      ignore_errors: yes

    - name: Remove legacy initramfs vfio.sh
      ansible.builtin.file:
        path: /etc/initramfs-tools/scripts/init-top/vfio.sh
        state: absent

    - name: Remove legacy vfio.conf
      ansible.builtin.file:
        path: /etc/modprobe.d/vfio.conf
        state: absent

    - name: Restore GRUB from backup
      ansible.builtin.shell: |
        if [ -f /etc/default/grub.backup ]; then
          cp /etc/default/grub.backup /etc/default/grub
          update-grub
        fi
      ignore_errors: yes

    - name: Update initramfs
      ansible.builtin.command: update-initramfs -u -k all
      ignore_errors: yes

    - name: Restore iptables from backup
      ansible.builtin.shell: |
        if [ -f {{ talos_qemu_dir }}/iptables_bckp ]; then
          iptables-restore < {{ talos_qemu_dir }}/iptables_bckp
        fi
      ignore_errors: yes

    - name: Remove systemd service
      ansible.builtin.file:
        path: /etc/systemd/system/talos-qemu@.service
        state: absent
      notify: Reload systemd

    - name: Remove service configs
      ansible.builtin.file:
        path: /etc/talos-qemu
        state: absent

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
