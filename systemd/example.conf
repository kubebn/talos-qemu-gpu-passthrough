# Talos QEMU VM Configuration
# Place this file at /etc/talos-qemu/<instance-name>.conf
# Then enable the service: systemctl enable --now talos-qemu@<instance-name>

# Working directory containing the scripts and VM files
WORKING_DIR=/opt/talos-qemu-gpu-passthrough

# VM IP address
VM_IP=192.168.100.2

# Enable GPU passthrough (true/false)
GPU_PASSTHROUGH=true

# Enable Fabric Manager support (true/false)
FABRIC=false
